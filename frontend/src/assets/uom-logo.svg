<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">

  <!-- Shield background -->
  <path d="M100 8 L185 40 L185 130 Q185 185 100 218 Q15 185 15 130 L15 40 Z"
    fill="#1e3c72" />

  <!-- Shield inner border -->
  <path d="M100 18 L175 46 L175 128 Q175 178 100 208 Q25 178 25 128 L25 46 Z"
    fill="none" stroke="#c9a227" stroke-width="2.5" />

  <!-- Gold inner fill -->
  <path d="M100 22 L171 49 L171 127 Q171 174 100 203 Q29 174 29 127 L29 49 Z"
    fill="#f8f3e6" />

  <!-- Rising sun rays -->
  <g transform="translate(100, 95)">
    <!-- Sun circle -->
    <circle cx="0" cy="-20" r="14" fill="#c9a227" opacity="0.9"/>
    <!-- Sun rays -->
    <line x1="0"   y1="-38" x2="0"   y2="-44" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12"  y1="-33" x2="15"  y2="-38" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20"  y1="-22" x2="25"  y2="-24" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="-33" x2="-15" y2="-38" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="-22" x2="-25" y2="-24" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="17"  y1="-10" x2="21"  y2="-10" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
    <line x1="-17" y1="-10" x2="-21" y2="-10" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Lake Tanganyika waves -->
  <g transform="translate(0, 0)">
    <!-- Lake surface -->
    <path d="M38 148 Q60 142 82 148 Q104 154 126 148 Q148 142 162 148 L162 165 Q148 159 126 165 Q104 171 82 165 Q60 159 38 165 Z"
      fill="#2a9d8f" opacity="0.85"/>
    <!-- Wave lines -->
    <path d="M42 152 Q62 147 84 152 Q106 157 126 152 Q146 147 160 152"
      fill="none" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <path d="M42 158 Q62 153 84 158 Q106 163 126 158 Q146 153 160 158"
      fill="none" stroke="#fff" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Shore / ground line -->
  <path d="M38 165 Q100 161 162 165 L162 168 Q100 172 38 168 Z"
    fill="#8b6914" opacity="0.6"/>

  <!-- Baobab tree trunk -->
  <rect x="95" y="118" width="10" height="48" rx="3" fill="#1e3c72"/>

  <!-- Baobab thick lower trunk -->
  <path d="M90 145 Q95 140 100 140 Q105 140 110 145 L112 168 Q106 166 100 166 Q94 166 88 168 Z"
    fill="#1e3c72"/>

  <!-- Baobab roots -->
  <path d="M88 162 Q82 168 76 166" fill="none" stroke="#1e3c72" stroke-width="3" stroke-linecap="round"/>
  <path d="M112 162 Q118 168 124 166" fill="none" stroke="#1e3c72" stroke-width="3" stroke-linecap="round"/>
  <path d="M90 165 Q86 170 82 170" fill="none" stroke="#1e3c72" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M110 165 Q114 170 118 170" fill="none" stroke="#1e3c72" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Baobab canopy — large flat top -->
  <ellipse cx="100" cy="108" rx="36" ry="16" fill="#1e3c72"/>

  <!-- Canopy branches detail -->
  <path d="M68 110 Q74 100 85 105" fill="none" stroke="#1e3c72" stroke-width="4" stroke-linecap="round"/>
  <path d="M132 110 Q126 100 115 105" fill="none" stroke="#1e3c72" stroke-width="4" stroke-linecap="round"/>
  <path d="M72 108 Q76 96 82 100" fill="none" stroke="#c9a227" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M128 108 Q124 96 118 100" fill="none" stroke="#c9a227" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Small leaf clusters on canopy -->
  <circle cx="80"  cy="98"  r="7"  fill="#2a7d3f" opacity="0.9"/>
  <circle cx="92"  cy="93"  r="9"  fill="#2e8b4a" opacity="0.9"/>
  <circle cx="100" cy="91"  r="10" fill="#2e8b4a" opacity="0.95"/>
  <circle cx="110" cy="93"  r="9"  fill="#2e8b4a" opacity="0.9"/>
  <circle cx="120" cy="98"  r="7"  fill="#2a7d3f" opacity="0.9"/>
  <circle cx="86"  cy="96"  r="6"  fill="#36a35a" opacity="0.8"/>
  <circle cx="114" cy="96"  r="6"  fill="#36a35a" opacity="0.8"/>

  <!-- Shield bottom gold trim -->
  <path d="M100 218 Q15 185 15 130 L15 40 L25 44 L25 128 Q25 178 100 207 Q175 178 175 128 L175 44 L185 40 L185 130 Q185 185 100 218 Z"
    fill="none" stroke="#c9a227" stroke-width="1" opacity="0.4"/>

  <!-- Gold star decorations on shield sides -->
  <text x="48"  y="80" font-size="10" fill="#c9a227" opacity="0.7" text-anchor="middle">✦</text>
  <text x="152" y="80" font-size="10" fill="#c9a227" opacity="0.7" text-anchor="middle">✦</text>

  <!-- Text area below shield -->
  <!-- University name line 1 -->
  <text x="100" y="232"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="11.5"
    font-weight="900"
    fill="#1e3c72"
    text-anchor="middle"
    letter-spacing="1.5">
    UNIVERSITY OF MPIMBWE
  </text>

</svg>
